name: CI

on:
  push:
  pull_request:

# Cancels all previous workflow runs for the same branch that have not yet completed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:

  tests:
    name: "PHP ${{ matrix.php }}${{ matrix.with_coverage == true && ' with coverage' || ''}}, PHPCS ${{ matrix.phpcs_version }}"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: [ '5.6', '7.0', '7.1', '7.2', '7.3', '7.4']
        with_coverage: [ false ]
        phpcs_version: ['^3.9']
        include:
          - php: 7.4
            phpcs_version: ^3.9@dev
          - php: 7.4
            phpcs_version: ^3.9
            with_coverage: true
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          coverage: "xdebug"
          php-version: "${{ matrix.php }}"
          tools: composer

      - name: Prepare dependencies
        run: |
          composer require squizlabs/php_codesniffer:${{ matrix.phpcs_version }} --dev --no-update

      - name: Install dependencies
        uses: "ramsey/composer-install@v3"
        with:
          dependency-versions: "highest"

      - name: Run tests with Coverage
        if: "${{ matrix.with_coverage == true }}"
        run: |
          vendor/bin/phpunit -v --coverage-clover=coverage.clover

      - name: Run tests without Coverage
        if: "${{ matrix.with_coverage == false }}"
        run: |
          vendor/bin/phpunit -v

      - name: Upload Coverage to CodeCov
        if: "${{ matrix.with_coverage == true }}"
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Coverage to Scrutinizer CI (PHP < 8.0)
        if: "${{ matrix.php < '8.0' }}"
        run: |
          wget https://scrutinizer-ci.com/ocular.phar
          php ocular.phar code-coverage:upload --repository=g/aik099/CodingStandard --format=php-clover coverage.clover

      - name: Upload Coverage to Scrutinizer CI (PHP >= 8.0)
        if: "${{ matrix.php >= '8.0' }}"
        run: |
           composer require scrutinizer/ocular
           vendor/bin/ocular code-coverage:upload --repository=g/aik099/CodingStandard --format=php-clover coverage.clover
